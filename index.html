<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yanister</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; display: flex; justify-content: center; }
  .app { width: 100%; max-width: 400px; padding: 2rem 1rem 3rem; }
  .logo { text-align: center; margin-bottom: 2rem; }
  .logo img { height: 36px; }
  .idle-view, .login-view, .scanning-view, .player-view { margin-top: 150px; }
  .login-view { text-align: center; }
  .login-view p { font-size: 14px; color: #888; margin-bottom: 1.25rem; line-height: 1.6; }
  .login-btn { width: 100%; padding: 16px; background: #ff69b4; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; }
  .idle-view { text-align: center; display: none; }
  .scan-btn { width: 100%; padding: 16px; background: #ff69b4; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; }
  .scanning-view, .player-view { display: none; }
  .scanner-wrap { background: #1a1a1a; border-radius: 14px; overflow: hidden; }
  #qr-reader { width: 100%; }
  .scanning-label { display: flex; align-items: center; gap: 8px; padding: 0.875rem 1.25rem; font-size: 13px; color: #ff69b4; }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: #ff69b4; flex-shrink: 0; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.75)} }
  .stop-btn { width: 100%; margin-top: 0.875rem; padding: 13px; background: transparent; color: #888; border: 0.5px solid #333; border-radius: 12px; font-size: 14px; cursor: pointer; }
  .playing-indicator { display: flex; align-items: center; gap: 10px; font-size: 15px; color: #ff69b4; padding: 1.5rem; background: #1a1a1a; border-radius: 14px; margin-bottom: 1rem; }
  .action-row { display: flex; gap: 10px; }
  .new-scan-btn { flex: 1; padding: 15px; background: #ff69b4; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 500; cursor: pointer; }
  .stop-btn2 { padding: 15px 20px; background: transparent; color: #888; border: 0.5px solid #333; border-radius: 12px; font-size: 14px; cursor: pointer; }
  .error-box { background: #2a1414; border: 0.5px solid #5a2020; border-radius: 10px; padding: 0.875rem; font-size: 13px; color: #f87171; margin-top: 0.875rem; display: none; }
  .status-msg { font-size: 13px; color: #888; text-align: center; padding: 0.5rem 0; }
  .info-box { background: #1a1a1a; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; font-size: 13px; color: #888; line-height: 1.6; display: none; }
</style>
</head>
<body>
<div class="app">
  <div class="logo"><img src="logo.png" alt="Yanister"></div>

  <div class="login-view" id="login-view">
    <p>Connect your Spotify Premium account to play songs when you scan a card.</p>
    <button class="login-btn" onclick="loginSpotify()">Connect Spotify</button>
  </div>

  <div class="idle-view" id="idle-view">
    <div class="info-box" id="info-box">
      Make sure Spotify is open and playing on your phone before scanning!
    </div>
    <button class="scan-btn" onclick="startScanner()">Scan a card</button>
    <div class="status-msg" id="player-status"></div>
  </div>

  <div class="scanning-view" id="scanning-view">
    <div class="scanner-wrap">
      <div id="qr-reader"></div>
      <div class="scanning-label"><div class="pulse"></div> Point at a card QR code</div>
    </div>
    <button class="stop-btn" onclick="stopScanner()">Stop</button>
    <div class="error-box" id="error-box"></div>
  </div>

  <div class="player-view" id="player-view">
    <div class="playing-indicator">
      <div class="pulse"></div>
      Playing...
    </div>
    <div class="action-row">
      <button class="new-scan-btn" onclick="startScanner()">Scan new card</button>
      <button class="stop-btn2" onclick="stopAll()">Stop</button>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = '35a109eb7bdf4ec9bb06b115f487bdf6';
const REDIRECT_URI = 'https://yanivbret-oss.github.io/yanister/';
const SCOPES = 'streaming user-read-email user-read-private user-modify-playback-state user-read-playback-state';

let accessToken = null;
let scanner = null, scannerRunning = false;

function generateRandomString(length) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let result = '';
  for (let i = 0; i < length; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
  return result;
}

async function generateCodeChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function loginSpotify() {
  const verifier = generateRandomString(128);
  const challenge = await generateCodeChallenge(verifier);
  localStorage.setItem('code_verifier', verifier);
  const url = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(SCOPES)}&code_challenge_method=S256&code_challenge=${challenge}`;
  window.location.href = url;
}

async function getAccessToken(code) {
  const verifier = localStorage.getItem('code_verifier');
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ client_id: CLIENT_ID, grant_type: 'authorization_code', code, redirect_uri: REDIRECT_URI, code_verifier: verifier })
  });
  const data = await res.json();
  return data.access_token;
}

async function getActiveDevice() {
  const res = await fetch('https://api.spotify.com/v1/me/player/devices', {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  const data = await res.json();
  const devices = data.devices || [];
  const active = devices.find(d => d.is_active) || devices[0];
  return active ? active.id : null;
}

async function playTrack(trackId) {
  const deviceId = await getActiveDevice();
  if (!deviceId) {
    document.getElementById('player-status').textContent = 'Open Spotify on your phone first!';
    show('idle-view');
    document.getElementById('info-box').style.display = 'block';
    return;
  }
  await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ uris: [`spotify:track:${trackId}`], position_ms: 0 })
  });
  show('player-view');
}

function show(id) {
  ['login-view','idle-view','scanning-view','player-view'].forEach(v => {
    document.getElementById(v).style.display = v === id ? 'block' : 'none';
  });
}

function extractTrackId(url) {
  try {
    const u = new URL(url);
    if (u.hostname === 'open.spotify.com') {
      const parts = u.pathname.split('/');
      const idx = parts.indexOf('track');
      if (idx !== -1 && parts[idx+1]) return parts[idx+1].split('?')[0];
    }
  } catch(e) {}
  const m = url.match(/track[\/:]([A-Za-z0-9]{22})/);
  return m ? m[1] : null;
}

function startScanner() {
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('info-box').style.display = 'none';
  show('scanning-view');
  const doLaunch = () => {
    document.getElementById('qr-reader').innerHTML = '';
    scanner = new Html5Qrcode('qr-reader');
    scanner.start({ facingMode: 'environment' }, { fps: 10, qrbox: { width: 220, height: 220 }, aspectRatio: 1.0 }, onScanSuccess, () => {})
      .then(() => { scannerRunning = true; })
      .catch(() => { const e = document.getElementById('error-box'); e.textContent = 'Camera access denied.'; e.style.display = 'block'; });
  };
  if (scanner && scannerRunning) { scanner.stop().catch(() => {}).finally(() => { scannerRunning = false; doLaunch(); }); }
  else doLaunch();
}

function stopScanner() {
  if (scanner && scannerRunning) { scanner.stop().catch(() => {}); scannerRunning = false; }
  show('idle-view');
}

async function stopAll() {
  if (scanner && scannerRunning) { scanner.stop().catch(() => {}); scannerRunning = false; }
  try {
    await fetch('https://api.spotify.com/v1/me/player/pause', {
      method: 'PUT', headers: { Authorization: `Bearer ${accessToken}` }
    });
  } catch(e) {}
  show('idle-view');
}

async function onScanSuccess(text) {
  if (scanner && scannerRunning) { scanner.stop().catch(() => {}); scannerRunning = false; }
  const trackId = extractTrackId(text);
  if (trackId) {
    await playTrack(trackId);
  } else {
    const e = document.getElementById('error-box');
    e.textContent = 'No Spotify track found in this QR code.';
    e.style.display = 'block';
    show('scanning-view');
  }
}

const urlParams = new URLSearchParams(window.location.search);
const code = urlParams.get('code');
if (code) {
  document.getElementById('player-status').textContent = 'Connecting to Spotify...';
  show('idle-view');
  getAccessToken(code).then(token => {
    if (token) {
      accessToken = token;
      localStorage.setItem('access_token', token);
      window.history.replaceState({}, document.title, window.location.pathname);
      document.getElementById('player-status').textContent = '';
      document.getElementById('info-box').style.display = 'block';
    } else show('login-view');
  });
} else {
  const saved = localStorage.getItem('access_token');
  if (saved) {
    accessToken = saved;
    show('idle-view');
    document.getElementById('info-box').style.display = 'block';
  } else {
    show('login-view');
  }
}
</script>
</body>
</html>
